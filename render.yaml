services:
  - type: web
    name: teamup
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data

disk:
  - name: teamup-data
    mountPath: /var/data
    sizeGB: 1
